    Research:
      - company: CISPA Helmholtz Center for Information Security
        position: Affiliated Researcher
        location: Remote
        start_date: 2026-02
        end_date: present
        summary: >
          Characterizing performance bottlenecks of large-scale agent-based simulations using the
          DAMOV methodology on Google Cloud VMs; focusing on hardware-software co-design,
          particularly optimizing HBM-PIM (High Bandwidth Memory with Processing-In-Memory)
          architectures to address memory bottlenecks in high-performance computing environments.
        highlights:
          - Contributing to advanced research in fault-tolerant distributed systems and scalable simulation frameworks (BioDynaMo; CARTopiaX; NeuroDev).

      - company: RISC-V International
        position: Individual Member
        location: Remote
        start_date: 2024-08
        end_date: present
        summary: Participating in RISC-V community initiatives and following working groups.

