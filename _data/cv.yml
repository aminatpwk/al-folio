  summary: >
    Computer engineer with experience in full-stack software development, data protection, and
    systems research. Affiliated researcher at CISPA Helmholtz Center for Information Security,
    focusing on hardware-software co-design, HBM-PIM architectures, and performance characterization
    of large-scale agent-based simulations.

